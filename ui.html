<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1e1e1e; color: #ccc; padding: 16px;
    display: flex; flex-direction: column; height: 100vh;
  }
  h2 { font-size: 14px; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 11px; color: #888; margin-bottom: 16px; }

  .drop-zone {
    border: 2px dashed #555; border-radius: 8px;
    padding: 32px 16px; text-align: center;
    cursor: pointer; transition: all 0.2s;
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    min-height: 120px;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: #0ACF83; background: rgba(10, 207, 131, 0.05);
  }
  .drop-zone .icon { font-size: 32px; opacity: 0.5; }
  .drop-zone .label { font-size: 12px; color: #aaa; }
  .drop-zone .hint { font-size: 10px; color: #666; }

  input[type="file"] { display: none; }

  .progress { margin-top: 12px; display: none; }
  .progress.active { display: block; }
  .progress-bar {
    height: 4px; background: #333; border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: #0ACF83; border-radius: 2px;
    transition: width 0.3s ease; width: 0%;
  }
  .progress-text { font-size: 11px; color: #888; margin-top: 6px; }

  .log {
    margin-top: 12px; max-height: 100px; overflow-y: auto;
    font-size: 10px; font-family: 'SF Mono', Monaco, monospace;
    color: #666; line-height: 1.6;
  }
  .log .ok { color: #0ACF83; }
  .log .warn { color: #f5a623; }
  .log .err { color: #ff5c5c; }

  .stats {
    margin-top: 12px; display: none; padding: 10px;
    background: #252525; border-radius: 6px; font-size: 11px;
  }
  .stats.active { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
  .stats dt { color: #888; }
  .stats dd { color: #fff; text-align: right; }

  .footer {
    margin-top: auto; padding-top: 12px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; border-top: 1px solid #333;
  }
  .footer a { color: #888; text-decoration: none; transition: color 0.15s; }
  .footer a:hover { color: #0ACF83; }
  .report-btn {
    display: inline-flex; align-items: center; gap: 4px;
    background: none; border: 1px solid #444; border-radius: 4px;
    color: #888; padding: 4px 8px; font-size: 10px; cursor: pointer;
    transition: all 0.15s;
  }
  .report-btn:hover { border-color: #0ACF83; color: #0ACF83; }
  .report-btn.has-warnings:hover { border-color: #f5a623; color: #f5a623; }

  /* ─── Modal ─── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,.6); align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #252525; border: 1px solid #444; border-radius: 10px;
    width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto;
    padding: 20px;
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .modal-header h3 { font-size: 14px; color: #fff; }
  .modal-close {
    background: none; border: none; color: #666; font-size: 18px;
    cursor: pointer; padding: 4px; line-height: 1;
  }
  .modal-close:hover { color: #fff; }

  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 11px; color: #888;
    margin-bottom: 5px; font-weight: 600;
  }
  .form-group select,
  .form-group input,
  .form-group textarea {
    width: 100%; background: #1e1e1e; color: #ccc;
    border: 1px solid #444; border-radius: 6px;
    padding: 8px 10px; font-size: 12px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    outline: none; transition: border-color 0.15s;
  }
  .form-group select:focus,
  .form-group input:focus,
  .form-group textarea:focus { border-color: #0ACF83; }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-group .hint { font-size: 10px; color: #555; margin-top: 4px; }

  .form-warnings {
    background: #1e1e1e; border: 1px solid #333; border-radius: 6px;
    padding: 8px 10px; font-size: 10px; font-family: 'SF Mono', Monaco, monospace;
    color: #f5a623; max-height: 60px; overflow-y: auto; margin-bottom: 14px;
    line-height: 1.5;
  }

  .submit-btn {
    width: 100%; padding: 10px; border: none; border-radius: 6px;
    background: #0ACF83; color: #000; font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .submit-btn:hover { background: #00c47e; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .submit-btn.sent { background: #333; color: #0ACF83; }

  .form-status {
    text-align: center; font-size: 11px; margin-top: 10px;
    min-height: 16px;
  }
  .form-status.success { color: #0ACF83; }
  .form-status.error { color: #ff5c5c; }

  /* ─── Tabs in modal ─── */
  .type-tabs {
    display: flex; gap: 6px; margin-bottom: 14px;
  }
  .type-tab {
    flex: 1; padding: 8px; border: 1px solid #444; border-radius: 6px;
    background: #1e1e1e; color: #888; font-size: 11px; font-weight: 600;
    text-align: center; cursor: pointer; transition: all 0.15s;
  }
  .type-tab:hover { border-color: #666; color: #ccc; }
  .type-tab.active { border-color: #0ACF83; color: #0ACF83; background: rgba(10,207,131,0.05); }
  .type-tab.active[data-type="bug"] { border-color: #ff5c5c; color: #ff5c5c; background: rgba(255,92,92,0.05); }
  .type-tab.active[data-type="feature"] { border-color: #4d9fff; color: #4d9fff; background: rgba(77,159,255,0.05); }
</style>
</head>
<body>

<h2>Pen to Figma Importer</h2>
<p class="subtitle">Drop a .pen JSON export to create a fully editable Figma file</p>

<div class="drop-zone" id="dropZone">
  <div class="icon">&#128196;</div>
  <div class="label">Drop .json file here or click to browse</div>
  <div class="hint">Exported from Pencil via batch_get + get_variables</div>
</div>
<input type="file" id="fileInput" accept=".json,.pen">

<div class="progress" id="progress">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">Preparing...</div>
</div>

<dl class="stats" id="stats"></dl>
<div class="log" id="log"></div>

<div class="footer">
  <span>v1.0.1 &middot; <a href="https://github.com/cloverxlimited/pen-to-figma-importer" target="_blank">GitHub</a></span>
  <button class="report-btn" id="reportBtn" onclick="openModal()">Feedback</button>
</div>

<!-- Feedback Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3>Send Feedback</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>

    <div class="type-tabs">
      <div class="type-tab active" data-type="bug" onclick="setType(this)">Bug</div>
      <div class="type-tab" data-type="feature" onclick="setType(this)">Feature</div>
      <div class="type-tab" data-type="help" onclick="setType(this)">Help</div>
    </div>

    <form id="feedbackForm" onsubmit="submitFeedback(event)">
      <div class="form-group">
        <label>Summary</label>
        <input type="text" id="fbSummary" placeholder="Brief description of the issue or idea" required>
      </div>

      <div class="form-group">
        <label>Details</label>
        <textarea id="fbDetails" placeholder="Steps to reproduce, expected behavior, or feature description..."></textarea>
      </div>

      <div class="form-group">
        <label>Your email <span style="color:#555">(optional, for follow-up)</span></label>
        <input type="email" id="fbEmail" placeholder="you@example.com">
      </div>

      <div id="warningsSection" style="display:none">
        <label style="font-size:11px; color:#888; margin-bottom:5px; display:block; font-weight:600">Plugin warnings (auto-attached)</label>
        <div class="form-warnings" id="fbWarnings"></div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Send Feedback</button>
      <div class="form-status" id="formStatus"></div>
    </form>
  </div>
</div>

<script>
// ─── CONFIG ───
// Replace with your Formspree form ID from https://formspree.io
var FORMSPREE_ID = '__YOUR_FORMSPREE_ID__';
var FORMSPREE_URL = 'https://formspree.io/f/' + FORMSPREE_ID;

// ─── State ───
var warnings = [];
var selectedType = 'bug';

var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var progressEl = document.getElementById('progress');
var progressFill = document.getElementById('progressFill');
var progressText = document.getElementById('progressText');
var logEl = document.getElementById('log');
var statsEl = document.getElementById('stats');

// ─── Drop Zone ───
dropZone.addEventListener('click', function() { fileInput.click(); });
dropZone.addEventListener('dragover', function(e) {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', function() {
  dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  var file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
fileInput.addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (file) handleFile(file);
});

function handleFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      log('Parsed JSON: ' + (data.children ? data.children.length : Array.isArray(data) ? data.length : '?') + ' top-level nodes', 'ok');
      progressEl.classList.add('active');
      progressFill.style.width = '5%';
      progressText.textContent = 'Sending to plugin...';
      parent.postMessage({ pluginMessage: { type: 'import', data: data } }, '*');
    } catch (err) {
      log('Failed to parse JSON: ' + err.message, 'err');
    }
  };
  reader.readAsText(file);
}

function log(msg, cls) {
  var line = document.createElement('div');
  line.className = cls || '';
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
  if (cls === 'warn' || cls === 'err') {
    warnings.push(msg);
    var btn = document.getElementById('reportBtn');
    btn.textContent = 'Feedback (' + warnings.length + ')';
    btn.classList.add('has-warnings');
  }
}

// ─── Modal ───
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('formStatus').textContent = '';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').className = 'submit-btn';
  document.getElementById('submitBtn').textContent = 'Send Feedback';

  // Show warnings if any
  var ws = document.getElementById('warningsSection');
  var wc = document.getElementById('fbWarnings');
  if (warnings.length > 0) {
    ws.style.display = 'block';
    wc.textContent = warnings.join('\n');
  } else {
    ws.style.display = 'none';
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// Close on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function setType(el) {
  document.querySelectorAll('.type-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  selectedType = el.getAttribute('data-type');
}

function submitFeedback(e) {
  e.preventDefault();

  var summary = document.getElementById('fbSummary').value.trim();
  var details = document.getElementById('fbDetails').value.trim();
  var email = document.getElementById('fbEmail').value.trim();
  var btn = document.getElementById('submitBtn');
  var status = document.getElementById('formStatus');

  if (!summary) { status.textContent = 'Please add a summary.'; status.className = 'form-status error'; return; }

  var payload = {
    _subject: '[Pen-to-Figma ' + selectedType.toUpperCase() + '] ' + summary,
    type: selectedType,
    summary: summary,
    details: details || '(none)',
    email: email || '(not provided)',
    plugin_version: 'v1.0.1',
    warnings: warnings.length > 0 ? warnings.join('\n') : '(none)'
  };

  // Check if Formspree is configured
  if (FORMSPREE_ID === '__YOUR_FORMSPREE_ID__') {
    // Fallback: copy to clipboard and show message
    var text = '--- ' + selectedType.toUpperCase() + ' REPORT ---\n';
    text += 'Summary: ' + summary + '\n';
    text += 'Details: ' + (details || 'N/A') + '\n';
    text += 'Email: ' + (email || 'N/A') + '\n';
    text += 'Plugin: v1.0.1\n';
    if (warnings.length > 0) text += 'Warnings:\n' + warnings.join('\n') + '\n';

    // Try clipboard
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function() {
        status.textContent = 'Copied to clipboard! Email it to hello@vaskendesign.com';
        status.className = 'form-status success';
        btn.textContent = 'Copied!';
        btn.className = 'submit-btn sent';
      });
    } else {
      // Open mailto as last resort
      var mailto = 'mailto:hello@vaskendesign.com?subject=' + encodeURIComponent(payload._subject) + '&body=' + encodeURIComponent(text);
      window.open(mailto);
      status.textContent = 'Opening email client...';
      status.className = 'form-status success';
    }
    return;
  }

  // Submit to Formspree
  btn.disabled = true;
  btn.textContent = 'Sending...';
  status.textContent = '';
  status.className = 'form-status';

  fetch(FORMSPREE_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(res) {
    if (res.ok) {
      status.textContent = 'Sent! Thanks for your feedback.';
      status.className = 'form-status success';
      btn.textContent = 'Sent!';
      btn.className = 'submit-btn sent';
      document.getElementById('fbSummary').value = '';
      document.getElementById('fbDetails').value = '';
    } else {
      throw new Error('Server returned ' + res.status);
    }
  })
  .catch(function(err) {
    status.textContent = 'Failed to send: ' + err.message;
    status.className = 'form-status error';
    btn.disabled = false;
    btn.textContent = 'Try Again';
  });
}

// ─── Plugin Messages ───
window.onmessage = function(e) {
  var msg = e.data.pluginMessage;
  if (!msg) return;

  if (msg.type === 'progress') {
    progressFill.style.width = msg.percent + '%';
    progressText.textContent = msg.text;
  }
  if (msg.type === 'log') {
    log(msg.text, msg.level);
  }
  if (msg.type === 'done') {
    progressFill.style.width = '100%';
    progressText.textContent = 'Import complete!';
    if (msg.stats) {
      statsEl.classList.add('active');
      statsEl.innerHTML = Object.entries(msg.stats)
        .map(function(entry) { return '<dt>' + entry[0] + '</dt><dd>' + entry[1] + '</dd>'; })
        .join('');
    }
  }
  if (msg.type === 'error') {
    log('ERROR: ' + msg.text, 'err');
    progressText.textContent = 'Import failed';
    progressFill.style.background = '#ff5c5c';
  }
};
</script>
</body>
</html>
